<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="glow glow-1" aria-hidden="true"></div>
    <div class="glow glow-2" aria-hidden="true"></div>

    <main class="shell">

      <section class="panel input-panel" aria-label="Request input">
        <div class="panel-head">
          <h2>Request</h2>
          <div class="chip-row">
            <button class="chip" type="button" data-sample='{"data":["a","1","334","4","R","$"]}'>
              Example A
            </button>
            <button class="chip" type="button" data-sample='{"data":["2","a","y","4","&","-","*","5","92","b"]}'>
              Example B
            </button>
            <button class="chip" type="button" data-sample='{"data":["A","ABcD","DOE"]}'>
              Example C
            </button>
          </div>
        </div>

        <label class="field-label" for="payload">JSON body</label>
        <textarea
          id="payload"
          class="editor"
          spellcheck="false"
          autocomplete="off"
          aria-describedby="hint"
        >{
  "data": ["a", "1", "334", "4", "R", "$"]
}</textarea>
        <p id="hint" class="hint">
          Tip: the body must contain a <code>data</code> array of strings.
        </p>

        <div class="action-row">
          <button id="submit" class="btn-primary" type="button">
            <span class="btn-label">Send request</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
          <button id="reset" class="btn-ghost" type="button">Reset</button>
        </div>
      </section>

      <section
        id="result-region"
        class="panel result-panel is-empty"
        aria-live="polite"
        aria-label="Response"
      >
        <div class="panel-head">
          <h2>Response</h2>
          <span id="status-badge" class="status-badge">idle</span>
        </div>

        <div id="empty-state" class="empty-state">
          <div class="empty-orb" aria-hidden="true"></div>
          <p>Send a request to see the structured breakdown here.</p>
        </div>

        <div id="result-body" class="result-body" hidden>
          <div class="summary-grid">
            <div class="stat">
              <span class="stat-key">user_id</span>
              <span class="stat-val" id="r-userid">—</span>
            </div>
            <div class="stat">
              <span class="stat-key">sum</span>
              <span class="stat-val" id="r-sum">—</span>
            </div>
            <div class="stat">
              <span class="stat-key">roll_number</span>
              <span class="stat-val" id="r-roll">—</span>
            </div>
          </div>

          <div class="buckets">
            <div class="bucket">
              <span class="bucket-title">Even numbers</span>
              <div class="token-row" id="r-even"></div>
            </div>
            <div class="bucket">
              <span class="bucket-title">Odd numbers</span>
              <div class="token-row" id="r-odd"></div>
            </div>
            <div class="bucket">
              <span class="bucket-title">Alphabets</span>
              <div class="token-row" id="r-alpha"></div>
            </div>
            <div class="bucket">
              <span class="bucket-title">Special characters</span>
              <div class="token-row" id="r-special"></div>
            </div>
            <div class="bucket bucket-wide">
              <span class="bucket-title">Concat string</span>
              <div class="concat" id="r-concat">—</div>
            </div>
          </div>

          <details class="raw">
            <summary>Raw JSON</summary>
            <pre id="r-raw"><code></code></pre>
          </details>
        </div>
      </section>

    </main>

    <script src="/app.js"></script>
  </body>
</html>
